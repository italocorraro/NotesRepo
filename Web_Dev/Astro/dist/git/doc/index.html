<!DOCTYPE html><meta charset="utf-8"><p>Per inizializzare, direttamente:</p>
<pre class="astro-code astro-code-themes github-light github-dark dracula" style="--shiki-light:#24292e;--shiki-dark:#e1e4e8;--shiki-dracula:#F8F8F2;--shiki-light-bg:#fff;--shiki-dark-bg:#24292e;--shiki-dracula-bg:#282A36; overflow-x: auto;" tabindex="0" data-language="plaintext"><code><span class="line"><span>$ git clone git@github.com:user/repo.git</span></span></code></pre>
<p>se il file config contiene alias:</p>
<pre class="astro-code astro-code-themes github-light github-dark dracula" style="--shiki-light:#24292e;--shiki-dark:#e1e4e8;--shiki-dracula:#F8F8F2;--shiki-light-bg:#fff;--shiki-dark-bg:#24292e;--shiki-dracula-bg:#282A36; overflow-x: auto;" tabindex="0" data-language="plaintext"><code><span class="line"><span>$ git clone@github-alias:user/repo.git</span></span></code></pre>
<p>Dalla cartella della repo</p>
<pre class="astro-code astro-code-themes github-light github-dark dracula" style="--shiki-light:#24292e;--shiki-dark:#e1e4e8;--shiki-dracula:#F8F8F2;--shiki-light-bg:#fff;--shiki-dark-bg:#24292e;--shiki-dracula-bg:#282A36; overflow-x: auto;" tabindex="0" data-language="plaintext"><code><span class="line"><span>$ git config --local user.name "name"</span></span>
<span class="line"><span>$ git config --local user.email "em@com"</span></span></code></pre>
